name: PR Check (packages)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'tools/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Run type check (packages only)
        run: pnpm turbo check-types --filter='./packages/*'

      - name: Run lint (packages only)
        run: pnpm turbo lint --filter='./packages/*'

      - name: Verify changeset
        run: pnpm changeset status --since=origin/main
