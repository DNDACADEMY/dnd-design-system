name: PR Check (packages)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'tools/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Run type check (packages only)
        run: pnpm turbo check-types --filter='./packages/*'

      - name: Run lint (packages only)
        run: pnpm turbo lint --filter='./packages/*'

      - name: Verify changeset
        if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
        run: |
          if ! pnpm changeset status --since=origin/main 2>&1; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body "⚠️ **Changeset 누락**

            이 PR은 패키지에 변경사항이 있지만 changeset이 없습니다.
            릴리스에 포함하려면 아래 명령어로 changeset을 추가해주세요.

            \`\`\`bash
            pnpm changeset
            \`\`\`

            > changeset이 필요 없는 변경(CI, docs 등)이라면 이 코멘트를 무시해도 됩니다."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.DND_COMMENT_TOKEN }}
