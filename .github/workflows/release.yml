name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
          # npm Trusted Publishing (OIDC) 은 pnpm publish 가 자체 registry
          # 클라이언트를 써서 npm CLI 의 OIDC 토큰 교환 흐름을 타지 않기 때문에
          # 사용할 수 없다. trusted publisher 를 등록해도 publish 요청이 익명으로
          # 나가 npm 이 scoped 패키지에 대해 404 를 반환한다. pnpm 이 OIDC
          # 지원을 추가하면 이 NODE_AUTH_TOKEN 을 제거하고 id-token 기반으로
          # 되돌릴 수 있다. 그동안은 npm Automation token 을 사용한다.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Assign release PR to token owner
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
          REPO: ${{ github.repository }}
        run: |
          ASSIGNEE=$(gh api user --jq .login)
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/issues/$PR_NUMBER/assignees" \
            -f "assignees[]=$ASSIGNEE"
