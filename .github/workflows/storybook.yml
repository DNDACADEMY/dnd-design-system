name: Storybook

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - labeled

jobs:
  # Main 브랜치에서 dds-desktop 변경 여부 체크
  check-desktop-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dds-desktop has changes
        id: check_changes
        run: |
          # 직전 커밋과 현재 커밋 사이에서 dds-desktop 변경사항 확인
          if git diff --name-only HEAD^ HEAD | grep -q "^packages/dds-desktop/"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ dds-desktop에 변경사항이 있습니다."
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ dds-desktop에 변경사항이 없습니다. 배포를 건너뜁니다."
          fi

  # Main 브랜치 자동 배포
  deploy-main:
    needs: check-desktop-main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-desktop-main.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_MAIN_PROJECT_TOKEN }}
          workingDir: packages/dds-desktop
          buildScriptName: build-storybook
          autoAcceptChanges: true

  # Alpha 레이블 배포
  deploy-alpha:
    if: github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'alpha-storybook'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@latest
        continue-on-error: true
        with:
          projectToken: ${{ secrets.CHROMATIC_ALPHA_PROJECT_TOKEN }}
          workingDir: packages/dds-desktop
          buildScriptName: build-storybook
          autoAcceptChanges: false

      - name: Comment deployment URL
        uses: actions/github-script@v7
        if: steps.chromatic.outcome == 'success'
        with:
          script: |
            const storybookUrl = '${{ steps.chromatic.outputs.storybookUrl }}';
            const buildUrl = '${{ steps.chromatic.outputs.buildUrl }}';
            const prNumber = context.payload.pull_request.number;

            const comment = `## 🎨 스토리북 알파 배포 완료

            ### 📦 배포 주소
            - **스토리북:** ${storybookUrl}
            - **빌드 상세:** ${buildUrl}

            ### ℹ️ 정보
            - PR: #${prNumber}
            - 워크플로우: [실행 내역 보기](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
            console.log(`PR #${prNumber}에 코멘트 추가 완료`);

      - name: Comment deployment failure
        uses: actions/github-script@v7
        if: steps.chromatic.outcome == 'failure'
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const comment = `## ❌ 스토리북 알파 배포 실패

            ### ℹ️ 정보
            - PR: #${prNumber}
            - 워크플로우: [실행 내역 보기](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            배포 중 오류가 발생했습니다. 워크플로우 실행 내역을 확인해주세요.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
            console.log(`PR #${prNumber}에 실패 코멘트 추가 완료`);

      - name: Remove alpha-storybook label
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: prNumber,
                name: 'alpha-storybook'
              });
              console.log(`✅ PR #${prNumber}에서 'alpha-storybook' 레이블 삭제 완료`);
            } catch (error) {
              if (error.status === 404) {
                console.log(`ℹ️  PR #${prNumber}에 'alpha-storybook' 레이블이 없습니다 - 이미 삭제되었을 수 있습니다`);
              } else {
                console.error(`❌ 레이블 삭제 오류: ${error.message}`);
                // 레이블 삭제 실패는 워크플로우 실패로 처리하지 않음
              }
            }
